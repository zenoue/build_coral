name: Build Stock Pixel 4 Kernel (Coral)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Dọn dẹp bộ nhớ đệm
      run: |
        # Giải phóng dung lượng ổ cứng của máy ảo để chứa đủ mã nguồn AOSP
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

    - name: Cài đặt môi trường tối giản
      run: |
        sudo apt-get update
        # Lược bỏ các thư viện build ROM khổng lồ.
        # Chỉ cài đặt các công cụ host cơ bản để chạy Makefile và script của kernel.
        sudo apt-get install -y git build-essential bc bison flex libssl-dev rsync ccache

    - name: Thiết lập Ccache để tăng tốc lần build sau
      # Cache lại các object file đã compile. Lần chạy sau nếu code không đổi, quá trình build sẽ cực nhanh.
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-kernel-ccache-

    - name: Cài đặt Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+rx ~/bin/repo
        echo "~/bin" >> $GITHUB_PATH

    - name: Cấu hình Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Tải mã nguồn Kernel và kiểm tra dung lượng
      run: |
        mkdir kernel-workspace
        cd kernel-workspace
        
        # Thiết lập shallow clone để tải code nhánh android10-qpr3
        repo init -u https://android.googlesource.com/kernel/manifest -b android-msm-coral-4.14-android10-qpr3 --depth=1
        repo sync -c --no-tags --no-clone-bundle -j$(nproc)
        
        # Hiển thị tổng dung lượng của toàn bộ repo sau khi tải xong theo yêu cầu của huynh
        echo "=== TỔNG DUNG LƯỢNG MÃ NGUỒN ==="
        du -sh .
        echo "================================="

    - name: Biên dịch Kernel
      run: |
        cd kernel-workspace
        
        # Bật ccache cho script build của Google để tiết kiệm thời gian
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 5G # Giới hạn dung lượng ccache tối đa là 5GB
        
        # Chạy lệnh build. Lệnh sẽ tự tìm file build.config mặc định ở thư mục gốc.
        build/build.sh
        
        # Hiển thị hiệu quả của ccache sau khi build xong
        ccache -s

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pixel4-Stock-Kernel
        # Tải file kernel thành phẩm lên GitHub để huynh tải về
        path: kernel-workspace/out/android-msm-pixel-4.14/dist/Image.lz4