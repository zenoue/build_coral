name: Build Stock Pixel 4 Kernel (Coral)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Dọn dẹp bộ nhớ đệm
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

    - name: Cài đặt môi trường
      # Bước này dùng apt-get để cài đặt các trình biên dịch và thư viện lõi.
      # Không áp dụng được depth=1, nhưng máy chủ GitHub tải nội bộ rất nhanh (thường dưới 1 phút).
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential \
                zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 \
                libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make \
                optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom \
                libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 x11proto-core-dev \
                libx11-dev libgl1-mesa-dev xsltproc unzip libncurses-dev lib32z1-dev

    - name: Cài đặt Repo
      # Tải công cụ quản lý mã nguồn của Google trực tiếp bằng lệnh curl (chỉ tải 1 file duy nhất).
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+rx ~/bin/repo
        echo "~/bin" >> $GITHUB_PATH

    - name: Cấu hình Git
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Tải mã nguồn Kernel
      # Đây là nơi depth=1 phát huy tác dụng lớn nhất.
      # Thay vì tải hàng chục GB lịch sử thay đổi của kernel qua nhiều năm, 
      # --depth=1 chỉ tải trạng thái code của commit cuối cùng (giảm dung lượng xuống mức tối thiểu).
      run: |
        mkdir kernel-workspace
        cd kernel-workspace
        repo init -u https://android.googlesource.com/kernel/manifest -b android-msm-coral-4.14-android10-qpr3 --depth=1
        
        # -c: Chỉ tải đúng nhánh hiện tại.
        # --no-tags: Bỏ qua việc tải các tag đánh dấu phiên bản (không cần thiết khi build).
        # --no-clone-bundle: Ép tải file gốc thay vì các cục nén lịch sử của Google.
        repo sync -c --no-tags --no-clone-bundle -j$(nproc)

    - name: Biên dịch Kernel
      # Tiến hành build kernel thuần (Stock) không có KernelSU.
      run: |
        cd kernel-workspace
        BUILD_CONFIG=private/msm-google/build.config.floral build/build.sh

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pixel4-Stock-Kernel
        path: kernel-workspace/out/android-msm-pixel-4.14/dist/Image.lz4